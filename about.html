    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Space Grotesk', 'Courier New', monospace;
            line-height: 1.6;
            letter-spacing: 0.02em;
            min-height: 100vh;
        }
        a {
            color: #ff2a2a;
            text-decoration: none;
        }
        a:hover {
            color: #fff;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        ul {
            list-style: none;
        }

        /* ===== DESIGN TOKENS ===== */
        :root {
            --black: #0a0a0a;
            --off-black: #1a1a1a;
            --dark-gray: #2a2a2a;
            --concrete: #4a4a4a;
            --bedrock: #6a6a6a;
            --steel: #8a8a8a;
            --silver: #b0b0b0;
            --ash: #d0d0d0;
            --white: #f0f0f0;
            --red: #ff2a2a;
            --blood: #cc0000;
            --neon-red: #ff0055;
            --neon-blue: #00f0ff;
            --neon-green: #00ff88;
            --amber: #ffaa00;
            --acid: #aaff00;
            --purple-haze: #8a2be2;
            --font-xl: clamp(2rem, 6vw, 4.5rem);
            --font-lg: clamp(1.5rem, 4vw, 2.5rem);
            --font-md: clamp(1rem, 2vw, 1.4rem);
            --font-sm: clamp(0.8rem, 1.2vw, 1rem);
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 3rem;
            --spacing-xl: 5rem;
            --border-thin: 1px solid;
            --border-thick: 3px solid;
            --shadow-harsh: 6px 6px 0 rgba(255, 42, 42, 0.3);
            --shadow-red: 0 0 20px rgba(255, 42, 42, 0.5);
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        h1 {
            font-size: var(--font-xl);
            color: var(--white);
            text-shadow: 3px 3px 0 var(--red), 0 0 40px rgba(255, 42, 42, 0.3);
            line-height: 1;
        }
        h2 {
            font-size: var(--font-lg);
            color: var(--white);
            border-left: 4px solid var(--red);
            padding-left: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }
        .section-title {
            display: inline-block;
            background: var(--red);
            color: var(--black);
            padding: 0.2em 0.8em;
            font-size: var(--font-sm);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: var(--spacing-sm);
            letter-spacing: 0.1em;
        }

        /* ===== LAYOUT ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-md);
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .flex-center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gap-sm {
            gap: var(--spacing-sm);
        }
        .gap-md {
            gap: var(--spacing-md);
        }
        .mt-md {
            margin-top: var(--spacing-md);
        }
        .mb-md {
            margin-bottom: var(--spacing-md);
        }
        .mb-lg {
            margin-bottom: var(--spacing-lg);
        }
        .py-md {
            padding-top: var(--spacing-md);
            padding-bottom: var(--spacing-md);
        }
        .py-lg {
            padding-top: var(--spacing-lg);
            padding-bottom: var(--spacing-lg);
        }
        .py-xl {
            padding-top: var(--spacing-xl);
            padding-bottom: var(--spacing-xl);
        }

        /* ===== HEADER & NAV ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: var(--border-thin) var(--dark-gray);
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) 0;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .logo span {
            color: var(--red);
        }
        .logo:hover {
            text-shadow: 0 0 20px var(--red);
        }

        /* Desktop Nav */
        .nav-desktop {
            display: flex;
            gap: var(--spacing-md);
        }
        .nav-desktop a {
            font-size: var(--font-sm);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ash);
            transition: var(--transition-fast);
        }
        .nav-desktop a:hover,
        .nav-desktop a.active {
            color: var(--red);
            text-shadow: 0 0 10px var(--red);
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
            background: none;
            border: none;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--white);
            border-radius: 0;
            transition: var(--transition-smooth);
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        /* Mobile Nav (overlay) */
        .nav-mobile {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px);
            z-index: 99;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: var(--spacing-lg);
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .nav-mobile.open {
            display: flex;
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }
        .nav-mobile a {
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: var(--transition-fast);
        }
        .nav-mobile a:hover {
            color: var(--red);
            text-shadow: 0 0 30px var(--red);
        }

        /* ===== HERO (페이지별) ===== */
        .hero-info {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 50%, #1a0a0a 100%);
            padding: var(--spacing-xl) 0;
            border-bottom: 3px solid var(--red);
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        .hero-info::before {
            content: 'INFO';
            position: absolute;
            top: -50%;
            left: -10%;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(255, 42, 42, 0.03);
            text-transform: uppercase;
            pointer-events: none;
            letter-spacing: -0.05em;
            line-height: 1;
        }
        .hero-info h1 {
            margin-bottom: var(--spacing-sm);
        }
        .hero-info p {
            font-size: var(--font-md);
            color: var(--silver);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== INFO SECTION ===== */
        .info-block {
            background: var(--off-black);
            border: var(--border-thin) var(--dark-gray);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            transition: var(--transition-fast);
        }
        .info-block:hover {
            border-color: var(--red);
            box-shadow: var(--shadow-harsh);
        }
        .info-block h3 {
            color: var(--red);
            font-size: var(--font-md);
            margin-bottom: var(--spacing-sm);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .info-block h3::before {
            content: '//';
            color: var(--concrete);
            font-weight: 400;
        }
        .info-block ul {
            display: grid;
            gap: var(--spacing-xs);
        }
        .info-block ul li {
            padding-left: 1.2rem;
            position: relative;
            color: var(--ash);
            font-size: var(--font-sm);
        }
        .info-block ul li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: var(--red);
        }
        .info-block p {
            color: var(--silver);
            font-size: var(--font-sm);
        }
        .info-highlight {
            background: rgba(255, 42, 42, 0.1);
            border-left: 4px solid var(--red);
            padding: var(--spacing-sm);
            margin-top: var(--spacing-sm);
            font-weight: 500;
        }

        /* ===== FAQ SECTION ===== */
        .faq-block {
            background: transparent;
        }
        .faq-item {
            background: var(--off-black);
            border: var(--border-thin) var(--dark-gray);
            padding: var(--spacing-sm) var(--spacing-md);
            margin-bottom: var(--spacing-xs);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .faq-item:hover {
            border-color: var(--red);
        }
        .faq-question {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: var(--white);
            font-size: var(--font-sm);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .faq-question .icon {
            font-size: 1.2rem;
            transition: var(--transition-fast);
        }
        .faq-item.active .faq-question .icon {
            transform: rotate(45deg);
        }
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding-top: 0;
        }
        .faq-item.active .faq-answer {
            max-height: 300px;
            padding-top: var(--spacing-sm);
        }
        .faq-answer p {
            color: var(--ash);
            font-size: var(--font-sm);
            border-top: 1px solid var(--dark-gray);
            padding-top: var(--spacing-sm);
        }

        /* ===== CTA CARD ===== */
        .cta-card {
            background: linear-gradient(135deg, #1a0000 0%, #0a0a0a 100%);
            border: 2px solid var(--red);
            padding: var(--spacing-lg);
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 42, 42, 0.2);
        }
        .cta-card h2 {
            border-left: none;
            padding-left: 0;
            color: var(--white);
        }
        .cta-card h2 span {
            color: var(--red);
        }
        .cta-card p {
            font-size: var(--font-sm);
            color: var(--silver);
            margin-bottom: var(--spacing-md);
        }
        .btn {
            display: inline-block;
            background: transparent;
            border: 2px solid var(--red);
            color: var(--red);
            padding: 0.8em 2em;
            font-size: var(--font-sm);
            font-weight: 700;

</body>
